name: "Monitoring Prometheus Grafana"

on:
  workflow_run:
    workflows: ["🚢 Deploy Plateforme v12"]
    types:
      - completed
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: plateforme-paiement-eks
  MONITORING_NAMESPACE: monitoring

jobs:
  monitoring:
    name: "Prometheus + Grafana"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}
          kubectl get nodes

      - name: Installer Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Creer namespace monitoring
        run: |
          kubectl create namespace ${{ env.MONITORING_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Installer Prometheus et Grafana
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack             --namespace ${{ env.MONITORING_NAMESPACE }}             --set grafana.adminPassword=admin123             --set grafana.service.type=LoadBalancer             --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false             --set alertmanager.enabled=false             --set nodeExporter.enabled=true             --set kubeStateMetrics.enabled=true             --timeout 10m             --wait

      - name: Attendre URL ELB Grafana
        run: |
          for i in $(seq 1 20); do
            GRAFANA_URL=$(kubectl get svc prometheus-grafana -n ${{ env.MONITORING_NAMESPACE }} -o jsonpath="{.status.loadBalancer.ingress[0].hostname}" 2>/dev/null)
            if [ -n "$GRAFANA_URL" ]; then
              echo "Grafana URL: http://$GRAFANA_URL"
              break
            fi
            echo "Attente... $i/20"
            sleep 15
          done

      - name: Resume final
        run: |
          kubectl get pods -n ${{ env.MONITORING_NAMESPACE }}
          GRAFANA_URL=$(kubectl get svc prometheus-grafana -n ${{ env.MONITORING_NAMESPACE }} -o jsonpath="{.status.loadBalancer.ingress[0].hostname}")
          echo "Grafana: http://$GRAFANA_URL"
          echo "Login: admin / admin123"
