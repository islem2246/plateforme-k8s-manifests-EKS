# ============================================================
# deploy.yml — Déploiement Plateforme Électronique v12
# Déclenchement : push sur main + manuel
# ============================================================
# Si le cluster EKS n'existe pas, déclenche terraform.yml
# automatiquement puis continue le déploiement.
# ============================================================

name: "🚢 Deploy Plateforme v12"

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'terraform/**'
      - '**.md'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (aperçu sans appliquer)'
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: plateforme-paiement-eks
  NAMESPACE: plateforme-electronique
  ARGOCD_NAMESPACE: argocd
  ARGOCD_APP_NAME: plateforme-electronique
  REPO_URL: https://github.com/islem2246/plateforme-k8s-manifests-EKS
  REPO_BRANCH: main

permissions:
  contents: read
  actions: write          # nécessaire pour déclencher terraform.yml

jobs:
  # ============================================================
  # JOB 1 — Vérifier le cluster, créer si absent
  # ============================================================
  ensure-cluster:
    name: "🔎 Vérifier / Créer le cluster EKS"
    runs-on: ubuntu-latest

    outputs:
      cluster_status: ${{ steps.check.outputs.status }}
      cluster_created: ${{ steps.check.outputs.created }}

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Vérifier le statut du cluster EKS
        id: check
        run: |
          STATUS=$(aws eks describe-cluster \
            --name "$EKS_CLUSTER_NAME" \
            --region "$AWS_REGION" \
            --query 'cluster.status' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "📡 Statut du cluster : $STATUS"

          if [ "$STATUS" = "ACTIVE" ]; then
            echo "✅ Cluster ACTIVE — pas besoin de le créer"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  Cluster non disponible ($STATUS) — lancement de Terraform"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Déclencher le workflow Terraform (apply)
        if: steps.check.outputs.status != 'ACTIVE'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'terraform.yml',
              ref: context.ref,
              inputs: { action: 'apply' }
            });
            console.log('🚀 Workflow Terraform déclenché');

      - name: Attendre que le cluster EKS soit ACTIVE (max 20 min)
        if: steps.check.outputs.status != 'ACTIVE'
        run: |
          echo "⏳ Attente du cluster EKS..."
          MAX_ATTEMPTS=40
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            STATUS=$(aws eks describe-cluster \
              --name "$EKS_CLUSTER_NAME" \
              --region "$AWS_REGION" \
              --query 'cluster.status' \
              --output text 2>/dev/null || echo "NOT_FOUND")

            echo "  [$ATTEMPT/$MAX_ATTEMPTS] Statut : $STATUS"
            [ "$STATUS" = "ACTIVE" ] && echo "✅ Cluster ACTIVE" && exit 0
            sleep 30
          done

          echo "❌ Timeout — cluster non ACTIVE en 20 minutes"
          exit 1

  # ============================================================
  # JOB 2 — Validation des manifests YAML
  # ============================================================
  validate-manifests:
    name: "🔍 Validate Manifests"
    runs-on: ubuntu-latest
    needs: ensure-cluster

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer yamllint
        run: pip install yamllint --quiet

      - name: Valider tous les dossiers
        run: |
          for DIR in 00-namespace 01-secrets-configmaps 02-infrastructure \
                     03-gateway 04-services 05-frontend 06-ingress \
                     07-keycloak-realm 08-post-deploy; do
            if [ -d "$DIR" ]; then
              echo "📁 $DIR"
              find "$DIR" -name "*.yaml" -o -name "*.yml" | sort | while read f; do
                yamllint -d relaxed "$f" && echo "  ✅ $f" || echo "  ⚠️  $f"
              done
            else
              echo "  ⚠️  Dossier absent : $DIR"
            fi
          done

  # ============================================================
  # JOB 3 — Déploiement + ArgoCD GitOps
  # ============================================================
  deploy:
    name: "🚢 Deploy Plateforme v12 + ArgoCD"
    runs-on: ubuntu-latest
    needs: [ ensure-cluster, validate-manifests ]
    environment: production

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configurer kubectl pour EKS
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"
          kubectl cluster-info
          kubectl get nodes

      - name: "[DRY-RUN] Aperçu des manifests"
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          for DIR in 00-namespace 01-secrets-configmaps 02-infrastructure \
                     03-gateway 04-services 05-frontend 06-ingress \
                     07-keycloak-realm 08-post-deploy; do
            [ -d "$DIR" ] && kubectl apply --dry-run=server -R -f "$DIR/" || true
          done

      # ── Étapes deploy classique ─────────────────────────
      - name: "[1/8] Namespace"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: kubectl apply -f 00-namespace/

      - name: "[2/8] Secrets et ConfigMaps"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: kubectl apply -f 01-secrets-configmaps/

      - name: "[3/8] Infrastructure — PostgreSQL, Redis, Keycloak"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: kubectl apply -f 02-infrastructure/

      - name: "[3/8] ⏳ Attente PostgreSQL (120s)"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl -n "$NAMESPACE" wait --for=condition=ready pod \
            -l app=postgres --timeout=120s \
          && echo "✅ PostgreSQL prêt" || echo "⚠️  Timeout PostgreSQL"

      - name: "[3/8] ⏳ Attente Redis (90s)"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl -n "$NAMESPACE" wait --for=condition=ready pod \
            -l app=redis --timeout=90s \
          && echo "✅ Redis prêt" || echo "⚠️  Timeout Redis"

      - name: "[3/8] ⏳ Attente Keycloak (300s)"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl -n "$NAMESPACE" wait --for=condition=ready pod \
            -l app=keycloak --timeout=300s \
          && echo "✅ Keycloak prêt" || echo "⚠️  Timeout Keycloak"

      - name: "[4/8] API Gateway"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: kubectl apply -f 03-gateway/

      - name: "[5/8] Microservices métier"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: kubectl apply -f 04-services/

      - name: "[6/8] Frontend et Ingress"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl apply -f 05-frontend/
          kubectl apply -f 06-ingress/

      - name: "[7/8] Import realm Keycloak"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl apply -f 07-keycloak-realm/
          kubectl -n "$NAMESPACE" wait \
            --for=condition=complete job/keycloak-realm-import \
            --timeout=180s \
          && echo "✅ Realm importé" || echo "⚠️  Timeout realm"

      - name: "[8/8] Seed users"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl delete job seed-users -n "$NAMESPACE" --ignore-not-found=true
          kubectl apply -f 08-post-deploy/
          kubectl -n "$NAMESPACE" wait \
            --for=condition=complete job/seed-users \
            --timeout=120s \
          && echo "✅ Utilisateurs créés" || echo "⚠️  Timeout seed-users"

      # ============================================================
      # ── Fix Postgres/Redis — emptyDir si PVC Pending ────────────
      # ============================================================

      - name: "[Fix] Patcher postgres/redis en emptyDir si PVC bloqués"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          # Vérifier si postgres est Pending (PVC bloqué)
          PG_STATUS=$(kubectl get pod -n "$NAMESPACE" -l app=postgres \
            --no-headers 2>/dev/null | awk '{print $3}' | head -1)
          RD_STATUS=$(kubectl get pod -n "$NAMESPACE" -l app=redis \
            --no-headers 2>/dev/null | awk '{print $3}' | head -1)

          if [ "$PG_STATUS" = "Pending" ]; then
            echo "⚠️  Postgres Pending — patch emptyDir"
            kubectl delete pvc postgres-pvc -n "$NAMESPACE" --force 2>/dev/null || true
            kubectl patch deployment postgres -n "$NAMESPACE" --type=json \
              -p='[{"op":"replace","path":"/spec/template/spec/volumes/0","value":{"name":"postgres-storage","emptyDir":{}}}]'
            kubectl rollout restart deployment/postgres -n "$NAMESPACE"
          else
            echo "✅ Postgres OK ($PG_STATUS)"
          fi

          if [ "$RD_STATUS" = "Pending" ]; then
            echo "⚠️  Redis Pending — patch emptyDir"
            kubectl delete pvc redis-pvc -n "$NAMESPACE" --force 2>/dev/null || true
            kubectl patch deployment redis -n "$NAMESPACE" --type=json \
              -p='[{"op":"replace","path":"/spec/template/spec/volumes/0","value":{"name":"redis-storage","emptyDir":{}}}]'
            kubectl rollout restart deployment/redis -n "$NAMESPACE"
          else
            echo "✅ Redis OK ($RD_STATUS)"
          fi

          # Attendre qu'ils soient Ready
          kubectl -n "$NAMESPACE" wait --for=condition=ready pod \
            -l app=postgres --timeout=90s 2>/dev/null && echo "✅ Postgres prêt" || echo "⚠️  Timeout postgres"
          kubectl -n "$NAMESPACE" wait --for=condition=ready pod \
            -l app=redis --timeout=60s 2>/dev/null && echo "✅ Redis prêt" || echo "⚠️  Timeout redis"

      # ============================================================
      # ── ArgoCD — Installation + GitOps ──────────────────────────
      # ============================================================

      - name: "[ArgoCD 1/5] Installer ArgoCD (si absent)"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if kubectl get namespace "$ARGOCD_NAMESPACE" &>/dev/null && \
             kubectl get deployment argocd-server -n "$ARGOCD_NAMESPACE" &>/dev/null; then
            echo "✅ ArgoCD déjà installé — skip"
          else
            echo "=== Installation ArgoCD (stable) ==="
            kubectl create namespace "$ARGOCD_NAMESPACE" \
              --dry-run=client -o yaml | kubectl apply -f -
            kubectl apply -n "$ARGOCD_NAMESPACE" \
              --server-side \
              -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
            echo "✅ ArgoCD installé"
          fi

      - name: "[ArgoCD 2/5] Exposer ArgoCD via LoadBalancer"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: argocd-server-lb
            namespace: ${{ env.ARGOCD_NAMESPACE }}
          spec:
            type: LoadBalancer
            selector:
              app.kubernetes.io/name: argocd-server
            ports:
              - name: http
                port: 80
                targetPort: 8080
              - name: https
                port: 443
                targetPort: 8080
          EOF
          echo "✅ Service LoadBalancer ArgoCD appliqué"

      - name: "[ArgoCD 3/5] Attendre qu'ArgoCD soit prêt"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "⏳ Attente argocd-server (max 5 min)..."
          kubectl rollout status deployment/argocd-server \
            -n "$ARGOCD_NAMESPACE" --timeout=300s
          echo "✅ ArgoCD server Running"

      - name: "[ArgoCD 4/5] Créer l'Application ArgoCD"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          kubectl apply -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${{ env.ARGOCD_APP_NAME }}
            namespace: ${{ env.ARGOCD_NAMESPACE }}
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: ${{ env.REPO_URL }}
              targetRevision: ${{ env.REPO_BRANCH }}
              path: "."
              directory:
                recurse: true
                include: '{00-namespace,01-secrets-configmaps,02-infrastructure,03-gateway,04-services,05-frontend,06-ingress,07-keycloak-realm,08-post-deploy}/*.yaml'
            destination:
              server: https://kubernetes.default.svc
              namespace: ${{ env.NAMESPACE }}
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ApplyOutOfSyncOnly=true
              retry:
                limit: 5
                backoff:
                  duration: 10s
                  factor: 2
                  maxDuration: 3m
          EOF
          echo "✅ Application ArgoCD créée / mise à jour"

          # Patch pour garantir path + include corrects
          sleep 5
          kubectl patch application plateforme-electronique \
            -n argocd --type=merge -p='{"spec":{"source":{"path":".","directory":{"recurse":true,"include":"{00-namespace,01-secrets-configmaps,02-infrastructure,03-gateway,04-services,05-frontend,06-ingress,07-keycloak-realm,08-post-deploy}/*.yaml"}}}}'
          echo "✅ Patch path + include appliqué"

      - name: "[ArgoCD 5/5] Afficher mot de passe admin + URLs"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          # Attendre génération du secret
          sleep 30
          ARGOCD_PWD=$(kubectl get secret argocd-initial-admin-secret \
            -n "$ARGOCD_NAMESPACE" \
            -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "secret-pas-encore-prêt")

          # URL LoadBalancer ArgoCD
          sleep 20
          ARGOCD_URL=$(kubectl get svc argocd-server-lb \
            -n "$ARGOCD_NAMESPACE" \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "En cours...")

          # IP Nodes pour frontend/keycloak
          NODE_IP=$(kubectl get nodes \
            -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}' 2>/dev/null || echo "N/A")

          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  ACCÈS À LA PLATEFORME                                   ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  ArgoCD UI  → http://$ARGOCD_URL"
          echo "║  ArgoCD     → admin / $ARGOCD_PWD"
          echo "║  Frontend   → http://$NODE_IP:30180"
          echo "║  Keycloak   → http://$NODE_IP:30881"
          echo "╚══════════════════════════════════════════════════════════╝"

      # ── Health Check ─────────────────────────────────────
      - name: "🏥 Health Check — Vérifier les endpoints"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          NODE_IP=$(kubectl get nodes \
            -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}' \
            2>/dev/null || echo "")

          echo "=== Health Check des endpoints ==="

          # Frontend
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "http://$NODE_IP:30180" 2>/dev/null || echo "000")
          if [ "$FRONTEND_STATUS" = "200" ] || [ "$FRONTEND_STATUS" = "301" ] || [ "$FRONTEND_STATUS" = "302" ]; then
            echo "✅ Frontend → HTTP $FRONTEND_STATUS"
            echo "FRONTEND_OK=true" >> "$GITHUB_ENV"
          else
            echo "⚠️  Frontend → HTTP $FRONTEND_STATUS"
            echo "FRONTEND_OK=false" >> "$GITHUB_ENV"
          fi

          # Keycloak
          KEYCLOAK_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "http://$NODE_IP:30881" 2>/dev/null || echo "000")
          if [ "$KEYCLOAK_STATUS" = "200" ] || [ "$KEYCLOAK_STATUS" = "301" ] || [ "$KEYCLOAK_STATUS" = "302" ]; then
            echo "✅ Keycloak  → HTTP $KEYCLOAK_STATUS"
            echo "KEYCLOAK_OK=true" >> "$GITHUB_ENV"
          else
            echo "⚠️  Keycloak  → HTTP $KEYCLOAK_STATUS"
            echo "KEYCLOAK_OK=false" >> "$GITHUB_ENV"
          fi

          # API Gateway via LoadBalancer
          API_LB=$(kubectl get svc api-gateway-lb -n "$NAMESPACE" \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "http://$API_LB:8080/actuator/health" 2>/dev/null || echo "000")
          if [ "$API_STATUS" = "200" ]; then
            echo "✅ API Gateway → HTTP $API_STATUS"
            echo "API_OK=true" >> "$GITHUB_ENV"
          else
            echo "⚠️  API Gateway → HTTP $API_STATUS (normal si pas d'endpoint /health)"
            echo "API_OK=false" >> "$GITHUB_ENV"
          fi

          echo "NODE_IP=$NODE_IP" >> "$GITHUB_ENV"
          echo "API_LB=$API_LB" >> "$GITHUB_ENV"

      # ── ArgoCD Sync Status Check ─────────────────────────
      - name: "🔄 ArgoCD Sync Status Check"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "=== Vérification ArgoCD ==="

          SYNC=$(kubectl get application "$ARGOCD_APP_NAME" \
            -n "$ARGOCD_NAMESPACE" \
            -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          HEALTH=$(kubectl get application "$ARGOCD_APP_NAME" \
            -n "$ARGOCD_NAMESPACE" \
            -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
          REVISION=$(kubectl get application "$ARGOCD_APP_NAME" \
            -n "$ARGOCD_NAMESPACE" \
            -o jsonpath='{.status.sync.revision}' 2>/dev/null || echo "Unknown")

          echo "Sync   : $SYNC"
          echo "Health : $HEALTH"
          echo "Commit : $REVISION"

          if [ "$SYNC" = "Synced" ]; then
            echo "✅ ArgoCD Synced"
            echo "ARGOCD_SYNC=✅ Synced" >> "$GITHUB_ENV"
          else
            echo "⚠️  ArgoCD $SYNC"
            echo "ARGOCD_SYNC=⚠️ $SYNC" >> "$GITHUB_ENV"
          fi

          if [ "$HEALTH" = "Healthy" ]; then
            echo "✅ ArgoCD Healthy"
            echo "ARGOCD_HEALTH=✅ Healthy" >> "$GITHUB_ENV"
          else
            echo "⚠️  ArgoCD $HEALTH"
            echo "ARGOCD_HEALTH=⚠️ $HEALTH" >> "$GITHUB_ENV"
          fi

          # Compter les pods Running
          RUNNING=$(kubectl get pods -n "$NAMESPACE" --no-headers \
            2>/dev/null | grep -c "Running" || echo "0")
          TOTAL=$(kubectl get pods -n "$NAMESPACE" --no-headers \
            2>/dev/null | wc -l || echo "0")
          echo "PODS_RUNNING=$RUNNING" >> "$GITHUB_ENV"
          echo "PODS_TOTAL=$TOTAL" >> "$GITHUB_ENV"

          ARGOCD_URL=$(kubectl get svc argocd-server-lb \
            -n "$ARGOCD_NAMESPACE" \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "N/A")
          echo "ARGOCD_URL=$ARGOCD_URL" >> "$GITHUB_ENV"

      # ── Job Summary visuel ───────────────────────────────
      - name: "📊 Job Summary visuel"
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ## 🚢 Déploiement Plateforme Électronique v12
          SUMMARY

          echo "| Composant | Statut |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌐 Frontend (port 30180) | ${{ env.FRONTEND_OK == 'true' && '✅ UP' || '⚠️ Vérifier' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔐 Keycloak (port 30881) | ${{ env.KEYCLOAK_OK == 'true' && '✅ UP' || '⚠️ Vérifier' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚡ API Gateway | ${{ env.API_OK == 'true' && '✅ UP' || '⚠️ Vérifier' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔄 ArgoCD Sync | $ARGOCD_SYNC |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 💚 ArgoCD Health | $ARGOCD_HEALTH |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🐳 Pods Running | $PODS_RUNNING / $PODS_TOTAL |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🔗 Accès" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌐 Frontend | http://$NODE_IP:30180 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔐 Keycloak | http://$NODE_IP:30881 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ⚡ API Gateway | http://$API_LB:8080 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔄 ArgoCD UI | http://$ARGOCD_URL |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Commit** : \`${{ github.sha }}\` — ${{ github.event.head_commit.message }}" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Déclenché par** : ${{ github.actor }} — $(date '+%d/%m/%Y %H:%M')" >> "$GITHUB_STEP_SUMMARY"

      # ── Résumé final ────────────────────────────────────
      - name: "✅ État final"
        if: always()
        run: |
          echo "=== Pods plateforme ==="
          kubectl get pods -n "$NAMESPACE" -o wide || true
          echo "=== Pods ArgoCD ==="
          kubectl get pods -n "$ARGOCD_NAMESPACE" || true
          echo "=== Services ==="
          kubectl get services -n "$NAMESPACE" || true
          echo "=== Jobs ==="
          kubectl get jobs -n "$NAMESPACE" || true

      - name: "🔴 Debug si échec"
        if: failure()
        run: |
          kubectl get pods -n "$NAMESPACE" -o wide || true
          kubectl get events -n "$NAMESPACE" \
            --sort-by='.lastTimestamp' | tail -30 || true
