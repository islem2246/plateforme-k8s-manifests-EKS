# ============================================================
# API Gateway — Spring Cloud Gateway (sans Eureka)
# Routes vers les services via DNS Kubernetes
# v12 : StripPrefix=0 — le path complet est transmis aux services
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: plateforme-electronique
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
    spec:
      initContainers:
        - name: wait-for-keycloak
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Attente de Keycloak..."
              until nc -z keycloak.plateforme-electronique.svc.cluster.local 8080; do
                echo "Keycloak pas encore prêt, attente 5s..."
                sleep 5
              done
              echo "Keycloak est prêt !"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis.plateforme-electronique.svc.cluster.local 6379; do
                sleep 3
              done
      containers:
        - name: api-gateway
          image: yassmineg/plateforme-gateway:aad0d6e
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: microservices-config
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_CLOUD_DISCOVERY_ENABLED
              value: "false"
            # Redis config
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
            # Keycloak JWT
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: "http://keycloak.plateforme-electronique.svc.cluster.local:8080/realms/plateforme-electronique"
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: "http://keycloak.plateforme-electronique.svc.cluster.local:8080/realms/plateforme-electronique/protocol/openid-connect/certs"
          volumeMounts:
            - name: gateway-config-volume
              mountPath: /app/config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          startupProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 20
      volumes:
        - name: gateway-config-volume
          configMap:
            name: gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: plateforme-electronique
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: api-gateway
