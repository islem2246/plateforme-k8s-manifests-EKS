# ============================================================
# SECRETS — Plateforme Électronique
# ⚠️ En production : utiliser SealedSecrets, Vault ou SOPS
# Les valeurs ci-dessous sont en base64 (echo -n 'value' | base64)
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: plateforme-electronique
type: Opaque
data:
  # postgres
  POSTGRES_USER: cG9zdGdyZXM=
  # postgres_password (à changer !)
  POSTGRES_PASSWORD: cG9zdGdyZXNfcGFzc3dvcmQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: plateforme-electronique
type: Opaque
data:
  # admin
  KEYCLOAK_ADMIN: YWRtaW4=
  # admin_password (à changer !)
  KEYCLOAK_ADMIN_PASSWORD: YWRtaW5fcGFzc3dvcmQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: plateforme-electronique
type: Opaque
data:
  # redis_password (à changer !)
  REDIS_PASSWORD: cmVkaXNfcGFzc3dvcmQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: smtp-secret
  namespace: plateforme-electronique
type: Opaque
data:
  # your-email@gmail.com (à changer !)
  SMTP_USERNAME: eW91ci1lbWFpbEBnbWFpbC5jb20=
  # your-app-password (à changer !)
  SMTP_PASSWORD: eW91ci1hcHAtcGFzc3dvcmQ=
